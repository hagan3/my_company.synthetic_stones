[package]
title = "synthetic_stones"
version = "0.1.0"  # Semantic Versioning is used: https://semver.org/
description = "Replicator extension for generating synthetic stones."
category = "Simulation"  # How to categorize this in the Extension Manager
changelog = "docs/CHANGELOG.md"
icon = "data/icon.png"  # Icon to show in the Extension Manager
keywords = ["synthetic_stones", "usd", "async", "real-time", "coordinate-updates"]  # Search keywords for the Extension Manager
preview_image = "data/preview.png"  # Preview to show in the Extension Manager
readme  = "docs/README.md"  # Path (relative to the root) or content of readme markdown file for UI
repository = "https://github.com/NVIDIA-Omniverse/kit-app-template"  # URL of the extension source repository



[dependencies]
"omni.usd" = {}
"omni.replicator.core" = {}
"omni.kit.uiapp" = {}
[settings]


[[python.module]]  # Main python module this extension provides, it will be publicly available as "import my_company.stone_stream"
name = "my_company.stone_stream"


[documentation]
pages = [
    "docs/Overview.md",
    "docs/CHANGELOG.md",
]


[[test]]
dependencies = [
]

args = [
]